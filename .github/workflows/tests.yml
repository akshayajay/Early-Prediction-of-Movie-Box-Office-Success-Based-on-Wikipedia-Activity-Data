name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install testthat
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: testthat

      - name: Run tests
        run: Rscript -e "testthat::test_dir('tests/testthat')"
