name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install testthat
        run: Rscript -e "install.packages('testthat', repos='https://cloud.r-project.org', lib=.libPaths()[1])"

      - name: Run tests
        run: Rscript -e "library(testthat); test_dir('tests/testthat')"
